name: voicebridge_app
description: Native iOS/Android client for the voicebridge agent — talk to Claude Code from your phone.
publish_to: "none"
version: 0.1.0+1

environment:
  # Color.withValues (used by the theme) needs Flutter 3.27+ / Dart 3.6+.
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.5
  audioplayers: ^6.1.0    # play bridge-side (Piper) neural TTS audio, opt-in
  wakelock_plus: ^1.2.5   # keep the screen awake during talking mode (so the connection doesn't drop)

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# App icon — the voicebridge "voice bubble" mark. Sources live in assets/icon/
# (copied from the repo's branding/). Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#0d1117"
  adaptive_icon_foreground: "assets/icon/foreground.png"
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
  web:
    generate: true
    background_color: "#0d1117"
    theme_color: "#0d1117"
