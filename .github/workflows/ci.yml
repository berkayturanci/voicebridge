name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci
      - run: node --check server.js
      - run: node --check examples/cloud-runner/server.js
      - run: npm test
      - run: npm run smoke
