name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    # Uses a self-hosted runner (free for private repos). Register one with
    # scripts/setup-self-hosted-runner.sh — see docs/self-hosted-runner.md.
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node --check server.js
      - run: node --check examples/cloud-runner/server.js
      - run: npm test
      - run: npm run smoke
