name: Android Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: Optional pubspec version name override, for example 0.6.1
        required: false
      version_code:
        description: Optional monotonically increasing Android version code
        required: false

jobs:
  appbundle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter pub get
      - name: Validate signing secrets
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          test -n "$ANDROID_UPLOAD_KEYSTORE_BASE64" || (echo "Missing ANDROID_UPLOAD_KEYSTORE_BASE64" && exit 1)
          test -n "$ANDROID_KEY_ALIAS" || (echo "Missing ANDROID_KEY_ALIAS" && exit 1)
          test -n "$ANDROID_KEY_PASSWORD" || (echo "Missing ANDROID_KEY_PASSWORD" && exit 1)
          test -n "$ANDROID_STORE_PASSWORD" || (echo "Missing ANDROID_STORE_PASSWORD" && exit 1)
      - name: Configure Android signing
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
      - name: Build signed app bundle
        run: |
          BUILD_ARGS=(--release)
          if [ -n "${{ inputs.version_name }}" ]; then
            BUILD_ARGS+=(--build-name "${{ inputs.version_name }}")
          fi
          if [ -n "${{ inputs.version_code }}" ]; then
            BUILD_ARGS+=(--build-number "${{ inputs.version_code }}")
          fi
          flutter build appbundle "${BUILD_ARGS[@]}"
      - uses: actions/upload-artifact@v4
        with:
          name: voicebridge-android-release-aab
          path: app/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14
