<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>voicebridge</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, system-ui, sans-serif;
    background: #0d1117; color: #e6edf3;
    display: flex; flex-direction: column; height: 100dvh;
  }
  header {
    padding: 12px 14px; border-bottom: 1px solid #21262d;
    display: flex; align-items: center; gap: 8px; font-weight: 600;
  }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: #3fb950; flex: none; }
  header .spacer { flex: 1; }
  header select, header button {
    background: #21262d; color: #e6edf3; border: 1px solid #30363d;
    border-radius: 8px; padding: 6px 9px; font-size: 13px; max-width: 46vw;
  }
  header #session { font-weight: 600; }
  #logs { flex: 1; position: relative; overflow: hidden; }
  .log { position: absolute; inset: 0; overflow-y: auto; padding: 16px; display: none; flex-direction: column; gap: 10px; }
  .log.active { display: flex; }
  .msg { max-width: 85%; padding: 10px 13px; border-radius: 14px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
  .me { align-self: flex-end; background: #1f6feb; color: #fff; border-bottom-right-radius: 4px; }
  .claude { align-self: flex-start; background: #161b22; border: 1px solid #21262d; border-bottom-left-radius: 4px; }
  .sys { align-self: center; color: #8b949e; font-size: 13px; text-align: center; }
  footer { padding: 14px 16px calc(14px + env(safe-area-inset-bottom)); border-top: 1px solid #21262d; }
  #status { text-align: center; min-height: 20px; font-size: 13px; color: #8b949e; margin-bottom: 10px; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 16px; }
  #mic {
    width: 76px; height: 76px; border-radius: 50%; border: none;
    background: #238636; color: #fff; font-size: 30px; transition: transform .1s, background .2s;
  }
  #mic:active { transform: scale(.94); }
  #mic.listening { background: #da3633; animation: pulse 1.2s infinite; }
  #mic.thinking { background: #9e6a03; }
  #mic:disabled { opacity: .4; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(218,54,51,.6); } 50% { box-shadow: 0 0 0 14px rgba(218,54,51,0); } }
  .toggle { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #8b949e; gap: 4px; }
  select#lang { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px; padding: 6px; max-width: 110px; }
  .switch { position: relative; width: 44px; height: 26px; }
  .switch input { display: none; }
  .slider { position: absolute; inset: 0; background: #30363d; border-radius: 26px; transition: .2s; }
  .slider::before { content: ""; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  input:checked + .slider { background: #238636; }
  input:checked + .slider::before { transform: translateX(18px); }

  /* New-session modal */
  #modal { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 10; }
  #modal.open { display: flex; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 14px; padding: 18px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; }
  .card h3 { margin: 0; font-size: 16px; }
  .card label { font-size: 12px; color: #8b949e; display: flex; flex-direction: column; gap: 5px; }
  .card input, .card select { background: #0d1117; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px; padding: 9px; font-size: 15px; }
  .card .row { display: flex; gap: 10px; justify-content: flex-end; }
  .card .row button { padding: 9px 14px; border-radius: 8px; border: 1px solid #30363d; background: #21262d; color: #e6edf3; font-size: 14px; }
  .card .row button.primary { background: #238636; border-color: #238636; }
</style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <select id="session" aria-label="Oturum"></select>
    <button id="newSession" title="Yeni oturum">＋</button>
    <span class="spacer"></span>
    <button id="reset">Yeni sohbet</button>
  </header>

  <div id="logs"></div>

  <footer>
    <div id="status"></div>
    <div class="controls">
      <label class="toggle">
        <span>Dil</span>
        <select id="lang">
          <option value="tr-TR">Türkçe</option>
          <option value="en-US">English</option>
        </select>
      </label>
      <button id="mic" aria-label="Konuş">🎤</button>
      <label class="toggle">
        <span>Eller serbest</span>
        <span class="switch"><input type="checkbox" id="handsfree" /><span class="slider"></span></span>
      </label>
    </div>
  </footer>

  <div id="modal">
    <div class="card">
      <h3>Yeni oturum</h3>
      <label>İsim
        <input id="ns-name" placeholder="ör. Backend refactor" />
      </label>
      <label>Agent
        <select id="ns-agent"></select>
      </label>
      <label>Proje klasörü
        <input id="ns-dir" placeholder="/Users/you/project" />
      </label>
      <div class="row">
        <button id="ns-cancel">İptal</button>
        <button id="ns-create" class="primary">Oluştur</button>
      </div>
    </div>
  </div>

<script>
(() => {
  "use strict";
  const logs = document.getElementById("logs");
  const statusEl = document.getElementById("status");
  const micBtn = document.getElementById("mic");
  const langSel = document.getElementById("lang");
  const handsfree = document.getElementById("handsfree");
  const resetBtn = document.getElementById("reset");
  const sessionSel = document.getElementById("session");
  const newSessionBtn = document.getElementById("newSession");
  const modal = document.getElementById("modal");

  let CONFIG = { sttMode: "browser", authRequired: false, agents: [] };
  let token = localStorage.getItem("vb_token") || "";

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognizing = false;

  // Per-session state: { meta, logEl, turn:{busy, abort, bubble, full} }
  const S = new Map();
  let activeId = null;

  function active() { return S.get(activeId); }
  function setStatus(t) { statusEl.textContent = t || ""; }

  function authHeaders(extra) {
    const h = Object.assign({}, extra || {});
    if (CONFIG.authRequired && token) h["Authorization"] = "Bearer " + token;
    return h;
  }
  function ensureToken() {
    if (CONFIG.authRequired && !token) {
      token = (prompt("Erişim token'ı:") || "").trim();
      if (token) localStorage.setItem("vb_token", token);
    }
  }

  // ---------- Session DOM ----------
  function addSessionState(meta) {
    if (S.has(meta.id)) { S.get(meta.id).meta = meta; return S.get(meta.id); }
    const logEl = document.createElement("div");
    logEl.className = "log";
    logEl.dataset.session = meta.id;
    logs.appendChild(logEl);
    const st = { meta, logEl, turn: { busy: false, abort: null, bubble: null, full: "" } };
    S.set(meta.id, st);
    addMsg(meta.id, `${meta.name} · ${meta.agentLabel}\nMikrofona dokun, konuş.`, "sys");
    return st;
  }
  function addMsg(sessionId, text, cls) {
    const st = S.get(sessionId); if (!st) return null;
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text || "";
    st.logEl.appendChild(div);
    if (sessionId === activeId) st.logEl.scrollTop = st.logEl.scrollHeight;
    return div;
  }
  function rebuildSessionSelect() {
    sessionSel.innerHTML = "";
    for (const st of S.values()) {
      const o = document.createElement("option");
      o.value = st.meta.id;
      o.textContent = st.meta.name + " · " + st.meta.agentLabel;
      sessionSel.appendChild(o);
    }
    sessionSel.value = activeId;
  }
  function switchTo(id) {
    if (!S.has(id)) return;
    if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    speakQueue.length = 0; speakBuf = ""; speaking = false;
    activeId = id;
    for (const st of S.values()) st.logEl.classList.toggle("active", st.meta.id === id);
    sessionSel.value = id;
    refreshMic();
    const st = active(); if (st) st.logEl.scrollTop = st.logEl.scrollHeight;
  }

  // ---------- Mic UI reflects the active session ----------
  function refreshMic() {
    const st = active();
    micBtn.classList.remove("listening", "thinking");
    if (recognizing) { micBtn.classList.add("listening"); micBtn.textContent = "🎤"; micBtn.setAttribute("aria-label", "Durdur"); return; }
    if (st && st.turn.busy) { micBtn.classList.add("thinking"); micBtn.textContent = "⏹"; micBtn.setAttribute("aria-label", "Dur"); return; }
    micBtn.textContent = "🎤"; micBtn.setAttribute("aria-label", "Konuş");
  }

  // ---------- Speech synthesis (on-device), sentence queue ----------
  let speakBuf = "", speaking = false; const speakQueue = [];
  function cleanForSpeech(t) {
    return t
      .replace(/```[\s\S]*?```/g, " kod bloğu. ")
      .replace(/`([^`]*)`/g, "$1")
      .replace(/\[([^\]]+)\]\([^)]+\)/g, "$1")
      .replace(/[*_#>`|]/g, "")
      .trim();
  }
  function pickVoice() {
    const want = langSel.value.split("-")[0];
    const vs = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    return vs.find(v => v.lang && v.lang.toLowerCase().startsWith(want)) || null;
  }
  function drainSpeak() {
    if (speaking || !speakQueue.length || !("speechSynthesis" in window)) return;
    speaking = true;
    const u = new SpeechSynthesisUtterance(speakQueue.shift());
    u.lang = langSel.value;
    const v = pickVoice(); if (v) u.voice = v;
    u.onend = u.onerror = () => { speaking = false; drainSpeak(); };
    window.speechSynthesis.speak(u);
  }
  function feedSpeech(chunk) {
    speakBuf += chunk;
    let m;
    while ((m = speakBuf.match(/[\s\S]*?[.!?\n]+/))) {
      const sentence = cleanForSpeech(m[0]);
      speakBuf = speakBuf.slice(m[0].length);
      if (sentence) { speakQueue.push(sentence); drainSpeak(); }
    }
  }
  function flushSpeech() {
    const rest = cleanForSpeech(speakBuf); speakBuf = "";
    if (rest) { speakQueue.push(rest); drainSpeak(); }
  }

  // ---------- Stop the active session's turn + speech ----------
  function stopActive() {
    const st = active(); if (!st) return;
    if (st.turn.abort) { try { st.turn.abort.abort(); } catch (_) {} }
    if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    speakQueue.length = 0; speakBuf = ""; speaking = false;
    st.turn.busy = false;
    refreshMic();
    setStatus("Durduruldu.");
  }

  // ---------- Send to the agent and stream the reply ----------
  async function ask(sessionId, text) {
    const st = S.get(sessionId); if (!st) return;
    st.turn.busy = true; st.turn.stopped = false;
    st.turn.abort = new AbortController();
    if (sessionId === activeId) { refreshMic(); setStatus("Düşünüyor…"); }
    if (sessionId === activeId) { speakBuf = ""; speakQueue.length = 0; }
    const bubble = addMsg(sessionId, "", "claude"); let full = "";
    try {
      const r = await fetch("/api/ask", {
        method: "POST",
        headers: authHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify({ text, sessionId }),
        signal: st.turn.abort.signal,
      });
      if (r.status === 401) { localStorage.removeItem("vb_token"); token = ""; throw new Error("Token geçersiz. Sayfayı yenile."); }
      const reader = r.body.getReader(); const dec = new TextDecoder(); let buf = "";
      for (;;) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        let idx;
        while ((idx = buf.indexOf("\n")) >= 0) {
          const line = buf.slice(0, idx).trim(); buf = buf.slice(idx + 1);
          if (!line) continue;
          let ev; try { ev = JSON.parse(line); } catch (_) { continue; }
          if (ev.type === "delta") {
            full += ev.text; bubble.textContent = full;
            if (sessionId === activeId) {
              st.logEl.scrollTop = st.logEl.scrollHeight;
              setStatus("Cevap veriyor… (durdurmak için ⏹)");
              feedSpeech(ev.text);
            }
          } else if (ev.type === "error") {
            throw new Error(ev.error || "Sunucu hatası");
          }
        }
      }
      if (sessionId === activeId) flushSpeech();
      if (!full) bubble.textContent = "(boş cevap)";
    } catch (e) {
      if (e.name === "AbortError") {
        if (!full) bubble.remove();
      } else {
        bubble.remove(); addMsg(sessionId, "⚠️ " + e.message, "sys");
        if (sessionId === activeId) setStatus("");
      }
    } finally {
      st.turn.busy = false; st.turn.abort = null;
      if (sessionId === activeId) refreshMic();
      if (!st.turn.stopped && handsfree.checked && CONFIG.sttMode === "browser" && sessionId === activeId) startBrowserSTT();
    }
  }

  // ---------- Browser speech recognition ----------
  let rec = null;
  function startBrowserSTT() {
    const st = active();
    if (recognizing || (st && st.turn.busy) || !SR) return;
    rec = new SR();
    rec.lang = langSel.value; rec.interimResults = false; rec.maxAlternatives = 1;
    rec.onstart = () => { recognizing = true; refreshMic(); setStatus("Dinliyorum…"); };
    rec.onerror = (e) => {
      recognizing = false; refreshMic();
      setStatus(e.error === "not-allowed" ? "Mikrofon izni gerekli (https şart)." : "Hata: " + e.error);
    };
    rec.onend = () => { recognizing = false; refreshMic(); };
    rec.onresult = (ev) => {
      const text = ev.results[0][0].transcript.trim();
      if (text) { addMsg(activeId, text, "me"); ask(activeId, text); }
    };
    try { rec.start(); } catch (_) {}
  }
  function stopBrowserSTT() { if (rec && recognizing) rec.stop(); }

  // ---------- Whisper recording (server-side STT) ----------
  let mediaRec = null, chunks = [];
  async function startWhisper() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRec = new MediaRecorder(stream);
      chunks = [];
      mediaRec.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
      mediaRec.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        recognizing = false; refreshMic();
        const blob = new Blob(chunks, { type: mediaRec.mimeType || "audio/webm" });
        setStatus("Yazıya çevriliyor…");
        try {
          const r = await fetch("/api/stt", { method: "POST", headers: authHeaders({ "Content-Type": blob.type }), body: blob });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error || "STT hatası");
          setStatus("");
          if (data.text) { addMsg(activeId, data.text, "me"); ask(activeId, data.text); }
          else setStatus("Ses anlaşılmadı.");
        } catch (e) { setStatus("⚠️ " + e.message); }
      };
      mediaRec.start(); recognizing = true; refreshMic(); setStatus("Kaydediyorum… (bitince dokun)");
    } catch (e) { setStatus("Mikrofon açılamadı: " + e.message); }
  }
  function stopWhisper() { if (mediaRec && mediaRec.state !== "inactive") mediaRec.stop(); }

  // ---------- Mic button ----------
  micBtn.addEventListener("click", () => {
    const st = active();
    if (st && st.turn.busy) { stopActive(); return; }
    if ("speechSynthesis" in window) window.speechSynthesis.getVoices(); // unlock TTS on iOS
    ensureToken();
    if (CONFIG.sttMode === "whisper") {
      if (recognizing) stopWhisper(); else startWhisper();
    } else {
      if (recognizing) stopBrowserSTT(); else startBrowserSTT();
    }
  });

  resetBtn.addEventListener("click", async () => {
    try { await fetch("/api/reset", { method: "POST", headers: authHeaders({ "Content-Type": "application/json" }), body: JSON.stringify({ sessionId: activeId }) }); } catch (_) {}
    const st = active(); if (st) { st.logEl.innerHTML = ""; }
    addMsg(activeId, "Yeni sohbet başladı.", "sys");
  });

  sessionSel.addEventListener("change", () => switchTo(sessionSel.value));

  // ---------- New-session modal ----------
  function openModal() {
    const agentSel = document.getElementById("ns-agent");
    agentSel.innerHTML = "";
    (CONFIG.agents || []).forEach(a => {
      const o = document.createElement("option"); o.value = a.id; o.textContent = a.label; agentSel.appendChild(o);
    });
    document.getElementById("ns-name").value = "";
    document.getElementById("ns-dir").value = CONFIG.defaultProjectDir || "";
    modal.classList.add("open");
  }
  newSessionBtn.addEventListener("click", openModal);
  document.getElementById("ns-cancel").addEventListener("click", () => modal.classList.remove("open"));
  document.getElementById("ns-create").addEventListener("click", async () => {
    const name = document.getElementById("ns-name").value.trim();
    const agent = document.getElementById("ns-agent").value;
    const projectDir = document.getElementById("ns-dir").value.trim();
    try {
      const r = await fetch("/api/sessions", {
        method: "POST",
        headers: authHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify({ name, agent, projectDir }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Oluşturulamadı");
      addSessionState(data.session);
      rebuildSessionSelect();
      modal.classList.remove("open");
      switchTo(data.session.id);
    } catch (e) { alert("⚠️ " + e.message); }
  });

  if ("speechSynthesis" in window) {
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }

  // ---------- Boot ----------
  (async () => {
    try { CONFIG = await (await fetch("/api/config")).json(); } catch (_) {}
    if (CONFIG.sttMode === "browser" && !SR) {
      setStatus("Tarayıcı konuşma tanımayı desteklemiyor — iOS'ta Safari kullan.");
      micBtn.disabled = true;
    }
    if (CONFIG.sttMode === "whisper") {
      handsfree.disabled = true; // hands-free loop only in browser mode
      handsfree.closest(".toggle").style.opacity = .4;
    }
    ensureToken();
    let list = { sessions: [], defaultSessionId: null };
    try { list = await (await fetch("/api/sessions", { headers: authHeaders() })).json(); } catch (_) {}
    (list.sessions || []).forEach(addSessionState);
    activeId = list.defaultSessionId || (list.sessions[0] && list.sessions[0].id);
    if (!activeId && S.size) activeId = S.keys().next().value;
    rebuildSessionSelect();
    if (activeId) switchTo(activeId);
  })();
})();
</script>
</body>
</html>
