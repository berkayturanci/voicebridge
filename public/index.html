<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0d1117" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/icon.svg" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<title>voicebridge</title>
<script>
  // Apply the saved theme before first paint to avoid a flash.
  (() => {
    try {
      const p = JSON.parse(localStorage.getItem("vb_prefs") || "{}");
      if (p.theme && p.theme !== "system") document.documentElement.dataset.theme = p.theme;
    } catch (_) {}
  })();
</script>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #21262d;
    --border: #21262d; --border2: #30363d; --field: #0d1117;
    --text: #e6edf3; --muted: #8b949e; --accent: #1f6feb; --green: #238636;
    --chat-fs: 15px;
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --bg: #ffffff; --panel: #f6f8fa; --panel2: #eef1f4;
    --border: #d0d7de; --border2: #d0d7de; --field: #ffffff;
    --text: #1f2328; --muted: #59636e; --accent: #0969da; --green: #1a7f37;
    color-scheme: light;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --bg: #ffffff; --panel: #f6f8fa; --panel2: #eef1f4;
      --border: #d0d7de; --border2: #d0d7de; --field: #ffffff;
      --text: #1f2328; --muted: #59636e; --accent: #0969da; --green: #1a7f37;
      color-scheme: light;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100dvh;
  }
  header {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; font-weight: 600; flex: none;
  }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: #3fb950; flex: none; }
  header .spacer { flex: 1; }
  header select, header button {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border2);
    border-radius: 8px; padding: 6px 9px; font-size: 13px; max-width: 40vw;
  }
  header #session { font-weight: 600; max-width: 30vw; }
  header button { padding: 6px 8px; }
  #logs { flex: 1; position: relative; overflow: hidden; }
  #jump { position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%); display: none;
    background: var(--accent); color: #fff; border: none; border-radius: 16px; padding: 6px 12px;
    font-size: 13px; box-shadow: 0 2px 8px rgba(0,0,0,.3); z-index: 5; }
  #jump.show { display: block; }
  .log { position: absolute; inset: 0; overflow-y: auto; padding: 14px; display: none; flex-direction: column; gap: 10px; }
  .log.active { display: flex; }
  .msg { max-width: 88%; padding: 10px 13px; border-radius: 14px; line-height: 1.45; white-space: pre-wrap; word-wrap: break-word; font-size: var(--chat-fs); }
  .me { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .claude { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .codewrap { position: relative; margin: 8px 0 2px; }
  .codewrap.collapsed pre { max-height: 15em; overflow: hidden; }
  .togglebtn { display: block; margin: 4px 0 2px; background: var(--panel2); border: 1px solid var(--border2); color: var(--accent); border-radius: 6px; padding: 4px 9px; font-size: 12px; }
  .claude pre { margin: 0; background: var(--field); border: 1px solid var(--border2); border-radius: 8px; padding: 10px; overflow-x: auto; }
  .claude code, .claude pre { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
  .claude :not(pre) > code { background: var(--panel2); padding: 1px 5px; border-radius: 5px; font-size: 12px; }
  .copybtn { position: absolute; top: 6px; right: 6px; font-size: 11px; padding: 3px 7px; border-radius: 6px; border: 1px solid var(--border2); background: var(--panel2); color: var(--text); opacity: .85; }
  .sys { align-self: center; color: var(--muted); font-size: 13px; text-align: center; }
  .act { align-self: flex-start; color: var(--muted); font-size: 12px; font-style: italic; opacity: .85; padding: 0 4px; }

  footer { padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); flex: none; display: flex; flex-direction: column; gap: 9px; }
  #status { text-align: center; min-height: 18px; font-size: 12px; color: var(--muted); }
  .chips { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
  .chip { flex: none; padding: 6px 11px; border-radius: 16px; border: 1px solid var(--border2); background: var(--panel2); color: var(--text); font-size: 13px; white-space: nowrap; }
  .chip:disabled { opacity: .4; }
  .composer { display: flex; align-items: flex-end; gap: 8px; }
  #composer {
    flex: 1; resize: none; min-height: 44px; max-height: 140px; padding: 11px 12px;
    background: var(--field); color: var(--text); border: 1px solid var(--border2); border-radius: 12px;
    font: inherit; font-size: 16px; line-height: 1.3;
  }
  .iconbtn { flex: none; width: 46px; height: 46px; border-radius: 50%; border: none; font-size: 21px; color: #fff; }
  #send { background: var(--accent); }
  #send:disabled { opacity: .4; }
  #mic { background: var(--green); transition: transform .1s, background .2s; }
  #mic:active { transform: scale(.94); }
  #mic.listening { background: #da3633; animation: pulse 1.2s infinite; }
  #mic.thinking { background: #9e6a03; }
  #mic:disabled { opacity: .4; }
  #mic.na { opacity: .55; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(218,54,51,.6); } 50% { box-shadow: 0 0 0 12px rgba(218,54,51,0); } }
  .opts { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
  .opts select { background: var(--panel2); color: var(--text); border: 1px solid var(--border2); border-radius: 8px; padding: 5px 7px; font-size: 12px; }
  .opts label { display: inline-flex; align-items: center; gap: 6px; }
  .switch { position: relative; width: 40px; height: 24px; }
  .switch input { display: none; }
  .slider { position: absolute; inset: 0; background: var(--border2); border-radius: 24px; transition: .2s; }
  .slider::before { content: ""; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  input:checked + .slider { background: var(--green); }
  input:checked + .slider::before { transform: translateX(16px); }

  #home { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 15; padding: calc(12px + env(safe-area-inset-top)) 14px 14px; }
  #home.open { display: flex; }
  #home .home-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  #home .home-head h2 { margin: 0; font-size: 20px; }
  #home #homeNew { background: var(--green); border: none; color: #fff; border-radius: 9px; padding: 8px 12px; font-size: 14px; }
  #homeList { display: flex; flex-direction: column; gap: 9px; overflow-y: auto; }
  .scard { text-align: left; background: var(--panel); border: 1px solid var(--border2); border-radius: 12px; padding: 13px 14px; display: flex; flex-direction: column; gap: 4px; color: var(--text); }
  .scard .sc-name { font-size: 16px; font-weight: 600; }
  .scard .sc-meta { font-size: 12px; color: var(--accent); }
  .scard .sc-prev { font-size: 13px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #backBtn { font-size: 20px; }
  #talk { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 20; padding: 24px; }
  #talk.open { display: flex; }
  #talk #talkExit { position: absolute; top: calc(14px + env(safe-area-inset-top)); right: 16px; background: var(--panel2); color: var(--text); border: 1px solid var(--border2); border-radius: 50%; width: 42px; height: 42px; font-size: 16px; }
  #talk .orb { width: 150px; height: 150px; border-radius: 50%; background: var(--green); transition: background .3s; }
  #talk .orb.listening { background: #3fb950; animation: orbpulse 1.6s infinite; }
  #talk .orb.thinking { background: #9e6a03; animation: orbpulse 1s infinite; }
  #talk .orb.speaking { background: var(--accent); animation: orbpulse 1.1s infinite; cursor: pointer; }
  @keyframes orbpulse { 0%,100% { box-shadow: 0 0 0 0 rgba(63,185,80,.45); transform: scale(1); } 50% { box-shadow: 0 0 0 26px rgba(63,185,80,0); transform: scale(1.04); } }
  #talkState { font-size: 19px; font-weight: 600; }
  #talkHeard { font-size: 16px; color: var(--muted); text-align: center; min-height: 44px; max-width: 92%; }
  #talkHint { font-size: 12px; color: var(--muted); text-align: center; max-width: 80%; }
  #modal, #settings, #palette { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 10; }
  #modal.open, #settings.open, #palette.open { display: flex; }
  #login { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 30; }
  #login.open { display: flex; }
  #login .err { color: #f85149; font-size: 13px; min-height: 1em; }
  #paletteList { display: flex; flex-direction: column; gap: 3px; max-height: 52vh; overflow-y: auto; }
  #paletteList .pal-g { font-size: 11px; color: var(--muted); margin-top: 8px; padding: 0 4px; }
  #paletteList button { text-align: left; background: var(--panel2); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 9px 10px; font-size: 13px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .card { background: var(--panel); border: 1px solid var(--border2); border-radius: 14px; padding: 18px; width: 100%; max-width: 380px; max-height: 88vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .card h3 { margin: 0; font-size: 16px; }
  .card label { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 5px; }
  .card label.opt { flex-direction: row; align-items: center; justify-content: space-between; gap: 10px; }
  .card label.opt > select, .card label.opt > input[type=range] { flex: 0 0 auto; width: 150px; }
  .card .srow { display: flex; align-items: center; justify-content: space-between; }
  .card .srow button { background: none; border: none; color: var(--muted); font-size: 18px; }
  .card label.opt > #theme { background: var(--panel2); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 5px 10px; }
  .card input, .card select { background: var(--field); color: var(--text); border: 1px solid var(--border2); border-radius: 8px; padding: 9px; font-size: 15px; }
  #ns-tree { max-height: 190px; overflow-y: auto; border: 1px solid var(--border2); border-radius: 8px; padding: 6px; display: flex; flex-direction: column; gap: 2px; }
  #ns-tree .cur { font-size: 11px; color: var(--muted); padding: 2px 4px; word-break: break-all; }
  #ns-tree button { text-align: left; background: none; border: none; color: var(--text); padding: 7px 8px; border-radius: 6px; font-size: 14px; }
  #ns-tree button.up { color: var(--accent); }
  #ns-browse { background: var(--panel2); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 5px 10px; }
  .card .row { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
  .card .row button { padding: 9px 14px; border-radius: 8px; border: 1px solid var(--border2); background: var(--panel2); color: var(--text); font-size: 14px; }
  .card .row button.primary { background: var(--green); border-color: var(--green); color: #fff; }
</style>
</head>
<body>
  <header>
    <button id="backBtn" title="Sohbetler" aria-label="Sohbetler">←</button>
    <span class="dot"></span>
    <select id="session" aria-label="Oturum"></select>
    <button id="newSession" title="Yeni oturum">＋</button>
    <span class="spacer"></span>
    <button id="talkBtn" title="Konuşma modu" aria-label="Konuşma modu">📞</button>
    <button id="settingsBtn" title="Ayarlar" aria-label="Ayarlar">⚙</button>
  </header>

  <div id="logs">
    <button id="jump" aria-label="En alta git">↓ en son</button>
  </div>

  <footer>
    <div id="status"></div>
    <div class="chips" id="chips"></div>
    <div class="composer">
      <textarea id="composer" rows="1" placeholder="Yaz ya da 🎤 ile konuş…" enterkeyhint="send"></textarea>
      <button id="cmdBtn" class="iconbtn" aria-label="Komutlar" title="Komutlar">⌘</button>
      <button id="send" class="iconbtn" aria-label="Gönder">➤</button>
      <button id="mic" class="iconbtn" aria-label="Konuş">🎤</button>
    </div>
  </footer>

  <div id="login">
    <div class="card">
      <h3>🔒 Giriş</h3>
      <p style="margin:0;color:var(--muted);font-size:13px;">Bu köprü bir erişim token'ı ile korunuyor.</p>
      <label>Token <input id="loginToken" type="password" autocomplete="current-password" placeholder="Erişim token'ı" /></label>
      <div class="err" id="loginErr"></div>
      <button id="loginBtn" type="button">Giriş yap</button>
    </div>
  </div>

  <div id="home">
    <div class="home-head">
      <h2>Sohbetler</h2>
      <button id="homeNew" title="Yeni oturum" aria-label="Yeni oturum">＋ Yeni</button>
    </div>
    <div id="homeList"></div>
  </div>

  <div id="talk">
    <button id="talkExit" aria-label="Bitir">✕</button>
    <div class="orb" id="talkOrb"></div>
    <div id="talkState">Hazır</div>
    <div id="talkHeard"></div>
    <div id="talkHint">Konuş; durunca otomatik gönderilir. Cevap bitince tekrar dinler.</div>
  </div>

  <div id="palette">
    <div class="card">
      <div class="srow"><h3>Komutlar</h3><button id="paletteClose" aria-label="Kapat">✕</button></div>
      <input id="paletteSearch" placeholder="Ara…" autocomplete="off" />
      <div id="paletteList"></div>
    </div>
  </div>

  <div id="settings">
    <div class="card">
      <div class="srow"><h3>Ayarlar</h3><button id="settingsClose" aria-label="Kapat">✕</button></div>
      <label class="opt">Tema <button id="theme" title="Tema" aria-label="Tema">🌗</button></label>
      <label class="opt">Yazı boyutu <input type="range" id="fontSize" min="13" max="24" step="1" /></label>
      <label class="opt">Dil
        <select id="lang">
          <option value="tr-TR">Türkçe</option>
          <option value="en-US">English</option>
        </select>
      </label>
      <label class="opt">Mod <select id="mode"></select></label>
      <label class="opt">Eller serbest <span class="switch"><input type="checkbox" id="handsfree" /><span class="slider"></span></span></label>
      <label class="opt">Sesli uyarı <span class="switch"><input type="checkbox" id="cues" /><span class="slider"></span></span></label>
      <label class="opt">Kısa ses <span class="switch"><input type="checkbox" id="voice" /><span class="slider"></span></span></label>
      <label class="opt">Bildirim <span class="switch"><input type="checkbox" id="notify" /><span class="slider"></span></span></label>
      <label class="opt">Ses <select id="ttsVoice"></select></label>
      <label class="opt">Hız <input type="range" id="rate" min="0.6" max="1.6" step="0.1" /></label>
      <label class="opt">Sessizlik (otomatik gönder) <input type="range" id="talkSilence" min="0.6" max="2.5" step="0.1" /></label>
      <div class="row">
        <button id="renameSession">✎ Adlandır</button>
        <button id="delSession">🗑 Sil</button>
        <button id="reset" class="primary">Yeni sohbet</button>
      </div>
    </div>
  </div>

  <div id="modal">
    <div class="card">
      <h3>Yeni oturum</h3>
      <label>Favori <span style="display:flex;gap:8px;">
        <select id="ns-fav" style="flex:1"></select>
        <button id="ns-fav-del" type="button" title="Favoriyi sil">🗑</button>
      </span></label>
      <label>İsim <input id="ns-name" placeholder="ör. Backend refactor" /></label>
      <label>Agent <select id="ns-agent"></select></label>
      <label id="ns-runner-row" style="display:none">Çalışma yeri <select id="ns-runner"></select></label>
      <label id="ns-omodel-row" style="display:none">Ollama model <select id="ns-omodel"></select></label>
      <label>Mod <select id="ns-mode"></select></label>
      <label class="opt">Proje klasörü <button id="ns-browse" type="button">📁 Gözat</button></label>
      <input id="ns-dir" placeholder="/Users/you/project" />
      <div id="ns-tree" style="display:none"></div>
      <div class="row">
        <button id="ns-save">★ Kaydet</button>
        <button id="ns-cancel">İptal</button>
        <button id="ns-create" class="primary">Oluştur</button>
      </div>
    </div>
  </div>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const logs = $("logs"), statusEl = $("status"), micBtn = $("mic"), sendBtn = $("send");
  const composer = $("composer"), langSel = $("lang"), handsfree = $("handsfree");
  const resetBtn = $("reset"), sessionSel = $("session"), newSessionBtn = $("newSession");
  const modeSel = $("mode"), modal = $("modal"), themeBtn = $("theme"), cuesChk = $("cues"), chipsEl = $("chips"), voiceChk = $("voice"), notifyChk = $("notify"), ttsVoiceSel = $("ttsVoice"), rateInput = $("rate"), talkSilenceInput = $("talkSilence"), jumpBtn = $("jump");
  const talkSilenceMs = () => Math.round((prefs.talkSilence || 1.3) * 1000); // auto-send pause in talking mode
  const settingsEl = $("settings"), settingsBtn = $("settingsBtn"), fontSizeInput = $("fontSize");
  // Settings sheet open/close + backdrop dismiss.
  settingsBtn.addEventListener("click", () => settingsEl.classList.add("open"));
  $("settingsClose").addEventListener("click", () => settingsEl.classList.remove("open"));
  settingsEl.addEventListener("click", (e) => { if (e.target === settingsEl) settingsEl.classList.remove("open"); });
  modal.addEventListener("click", (e) => { if (e.target === modal) modal.classList.remove("open"); });
  function applyFontSize() { document.documentElement.style.setProperty("--chat-fs", (prefs.fontSize || 15) + "px"); }
  fontSizeInput.addEventListener("input", () => { prefs.fontSize = parseInt(fontSizeInput.value, 10) || 15; savePrefs(); applyFontSize(); });

  // Auto-scroll only when the user is already near the bottom (don't fight them).
  function nearBottom(el) { return el.scrollHeight - el.scrollTop - el.clientHeight < 80; }
  function updateJump() { const st = active(); jumpBtn.classList.toggle("show", !!(st && !nearBottom(st.logEl))); }
  function toBottom() { const st = active(); if (st) { st.logEl.scrollTop = st.logEl.scrollHeight; updateJump(); } }

  let CONFIG = { sttMode: "browser", authRequired: false, agents: [] };
  let token = localStorage.getItem("vb_token") || "";
  const agentById = {};

  // ---------- Preferences (persisted) ----------
  const THEMES = ["system", "light", "dark"];
  let prefs = {};
  try { prefs = JSON.parse(localStorage.getItem("vb_prefs") || "{}"); } catch (_) { prefs = {}; }
  const savePrefs = () => { try { localStorage.setItem("vb_prefs", JSON.stringify(prefs)); } catch (_) {} };
  function applyTheme() {
    const t = prefs.theme || "system";
    if (t === "system") delete document.documentElement.dataset.theme;
    else document.documentElement.dataset.theme = t;
    themeBtn.textContent = t === "light" ? "☀️" : t === "dark" ? "🌙" : "🌗";
    themeBtn.title = "Tema: " + t;
  }

  // ---------- Eyes-free audio cues (WebAudio earcons) ----------
  const cuesOn = () => prefs.cues !== false; // default on
  let actx = null;
  function ensureAudio() {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!actx && AC) actx = new AC();
    if (actx && actx.state === "suspended") actx.resume();
  }
  function tone(freq, startAt, dur, gain) {
    if (!actx) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = "sine"; o.frequency.value = freq;
    const t0 = actx.currentTime + startAt;
    g.gain.setValueAtTime(gain || 0.05, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(t0); o.stop(t0 + dur);
  }
  function cue(name) {
    if (!cuesOn() || !actx) return;
    if (name === "listen") tone(660, 0, 0.12);
    else if (name === "done") { tone(880, 0, 0.1); tone(1320, 0.11, 0.13); }
    else if (name === "error") tone(200, 0, 0.28, 0.07);
  }
  // Pull the user back when a reply finishes in the background or looks like a question.
  function maybeNotify(sessionName, text) {
    if (!prefs.notify || !("Notification" in window) || Notification.permission !== "granted") return;
    const isQ = /\?["')\]]*\s*$/.test(text.trim());
    if (!document.hidden && !isQ) return;
    const title = "voicebridge — " + sessionName + (isQ ? " soru sordu" : " hazır");
    const opts = { body: text.slice(0, 140), icon: "/icon.svg" };
    // Prefer the service worker (more reliable when backgrounded on mobile).
    if (navigator.serviceWorker && navigator.serviceWorker.ready) {
      navigator.serviceWorker.ready.then((reg) => reg.showNotification(title, opts)).catch(fallback);
    } else { fallback(); }
    function fallback() { try { const n = new Notification(title, opts); n.onclick = () => { window.focus(); n.close(); }; } catch (_) {} }
  }

  // Real Web Push (works when the app is closed) — only if the server advertises VAPID.
  function urlB64ToUint8(b64) {
    const pad = "=".repeat((4 - (b64.length % 4)) % 4);
    const s = (b64 + pad).replace(/-/g, "+").replace(/_/g, "/");
    const raw = atob(s); const arr = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }
  async function ensurePush() {
    try {

  // ---------- Render: markdown-ish text → bubble with code blocks ----------
  // Inline `code` and **bold**, built from DOM nodes (never innerHTML).
  function appendInline(el, text) {
    const re = /`([^`]+)`|\*\*([^*]+)\*\*/g;
    let last = 0, m;
    while ((m = re.exec(text))) {
      if (m.index > last) el.appendChild(document.createTextNode(text.slice(last, m.index)));
      if (m[1] != null) { const c = document.createElement("code"); c.textContent = m[1]; el.appendChild(c); }
      else { const b = document.createElement("strong"); b.textContent = m[2]; el.appendChild(b); }
      last = re.lastIndex;
    }
    if (last < text.length) el.appendChild(document.createTextNode(text.slice(last)));
  }
  function renderInto(el, text) {
    el.textContent = "";
    const parts = text.split(/```/);
    parts.forEach((part, i) => {
      if (i % 2 === 1) {
        const code = part.replace(/^\w*\n/, "");
        const wrap = document.createElement("div");
        wrap.className = "codewrap";
        const btn = document.createElement("button");
        btn.className = "copybtn"; btn.type = "button"; btn.textContent = "Kopyala";
        btn.addEventListener("click", () => {
          const done = (txt) => { btn.textContent = txt; setTimeout(() => (btn.textContent = "Kopyala"), 1200); };
          (navigator.clipboard ? navigator.clipboard.writeText(code) : Promise.reject())
            .then(() => done("Kopyalandı")).catch(() => done("Hata"));
        });
        const pre = document.createElement("pre");
        const codeEl = document.createElement("code");
        codeEl.textContent = code;
        pre.appendChild(codeEl);
        wrap.appendChild(btn); wrap.appendChild(pre);
        const lines = code.replace(/\n$/, "").split("\n").length;
        if (lines > 14) { // collapse long output (e.g. npm logs) by default
          wrap.classList.add("collapsed");
          const tog = document.createElement("button");
          tog.className = "togglebtn"; tog.type = "button";
          const setLabel = () => { tog.textContent = wrap.classList.contains("collapsed") ? ("⌄ tümünü göster (" + lines + " satır)") : "⌃ gizle"; };
          tog.addEventListener("click", () => { wrap.classList.toggle("collapsed"); setLabel(); });
          setLabel();
          wrap.appendChild(tog);
        }
        el.appendChild(wrap);
      } else if (part) {
        appendInline(el, part);
      }
    });
  }

  // ---------- Session DOM ----------
  function persistHistory(st) {

    logEl.addEventListener("scroll", () => { if (meta.id === activeId) updateJump(); });
    logs.appendChild(logEl);

    S.set(meta.id, st);
    let saved = [];
    try { saved = JSON.parse(localStorage.getItem("vb_hist_" + meta.id) || "[]"); } catch (_) {}
    if (Array.isArray(saved) && saved.length) {

    } else {

    }

  }
  function addMsg(sessionId, text, cls) {

  function dropMsg(st, el) { // remove a message + its persisted entry (e.g. aborted empty bubble)

  // ---------- Home: session list landing (mobile Claude Code style) ----------

  // ---------- Speech synthesis ----------
  let speakBuf = "", speaking = false; const speakQueue = [];
  function cleanForSpeech(t) {
    return t.replace(/```[\s\S]*?```/g, " kod bloğu. ").replace(/`([^`]*)`/g, "$1")
      .replace(/\[([^\]]+)\]\([^)]+\)/g, "$1").replace(/[*_#>`|]/g, "").trim();

    voicesFor(want).forEach((v) => { const o = document.createElement("option"); o.value = v.name; o.textContent = v.name.replace(/\s*\(.*\)$/, ""); ttsVoiceSel.appendChild(o); });
    ttsVoiceSel.value = (prefs.voices || {})[want] || "";

  // ---------- Stop ----------

  // ---------- Ask the agent and stream the reply ----------
  async function ask(sessionId, text) {
    const st = S.get(sessionId); if (!st || st.turn.busy) return;
    st.turn.busy = true; st.turn.stopped = false; st.turn.abort = new AbortController();
    if (sessionId === activeId) { refreshMic(); setStatus("Düşünüyor…"); speakBuf = ""; speakQueue.length = 0; }
    const bubble = addMsg(sessionId, "", "claude"); let full = "";
    try {
      const r = await fetch("/api/ask", {
        method: "POST", headers: authHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify({ text, sessionId, mode: st.meta.mode, voice: !!st.meta.voice }), signal: st.turn.abort.signal,
      });
      if (r.status === 401) { ensureToken(true); throw new Error("Token geçersiz — tekrar giriş yap."); }
      const reader = r.body.getReader(); const dec = new TextDecoder(); let buf = "";
      for (;;) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        let idx;
        while ((idx = buf.indexOf("\n")) >= 0) {
          const line = buf.slice(0, idx).trim(); buf = buf.slice(idx + 1);
          if (!line) continue;
          let ev; try { ev = JSON.parse(line); } catch (_) { continue; }
          if (ev.type === "delta") {
            const pinned = sessionId === activeId && nearBottom(st.logEl);
            full += ev.text; bubble.textContent = full;
            if (sessionId === activeId) {
              if (pinned) st.logEl.scrollTop = st.logEl.scrollHeight; else updateJump();
              setStatus("Cevap veriyor… (durdurmak için ⏹)"); feedSpeech(ev.text);
            }
          } else if (ev.type === "activity") {
            addMsg(sessionId, "⚙︎ " + ev.text, "act");
          } else if (ev.type === "error") { throw new Error(ev.error || "Sunucu hatası"); }
        }
      }
      if (full) renderInto(bubble, full); else bubble.textContent = emptyReplyHint(st.meta.agent);
      bubble._entry.text = full || bubble.textContent; persistHistory(st);
      if (sessionId === activeId) { flushSpeech(); setStatus(""); }
      cue("done");
      if (full) maybeNotify(st.meta.name, full);
    } catch (e) {
      if (e.name === "AbortError") { if (full) { renderInto(bubble, full); bubble._entry.text = full; persistHistory(st); } else dropMsg(st, bubble); }
      else { dropMsg(st, bubble); addMsg(sessionId, "⚠️ " + e.message, "sys"); if (sessionId === activeId) setStatus(""); cue("error"); }
    } finally {
      st.turn.busy = false; st.turn.abort = null;
      if (sessionId === activeId) refreshMic();
      if (!talking && !st.turn.stopped && handsfree.checked && CONFIG.sttMode === "browser" && sessionId === activeId) startBrowserSTT();
    }
  }

  function emptyReplyHint(agent) {
    if (agent === "antigravity") return "(boş cevap — agy farklı çağrı isteyebilir; sunucuda AGY_PROMPT_ARG=1 deneyin)";
    if (agent === "ollama") return "(boş cevap — model çekildi mi? `ollama pull <model>` ve OLLAMA_MODEL'i kontrol edin)";

  // ---------- Text composer ----------

  // ---------- Browser speech recognition ----------

    try { rec.start(); } catch (_) {}

  // ---------- Whisper recording ----------

        const blob = new Blob(chunks, { type: mediaRec.mimeType || "audio/webm" });
        setStatus("Yazıya çevriliyor…");

          const r = await fetch("/api/stt", { method: "POST", headers: authHeaders({ "Content-Type": blob.type }), body: blob });
          const data = await r.json();

        } catch (e) { setStatus("⚠️ " + e.message); }

  // ---------- Talking mode: continuous, hands-free voice conversation ----------
  const talkEl = $("talk"), talkOrb = $("talkOrb"), talkStateEl = $("talkState"), talkHeard = $("talkHeard");
  let talking = false, trec = null, talkFinal = "", talkSilence = null;
  function setTalkState(s, label) { talkOrb.className = "orb " + s; talkStateEl.textContent = label; }
  function enterTalking() {
    if (CONFIG.sttMode !== "browser" || !SR) { setStatus(noVoiceMsg()); return; }
    ensureToken(); ensureAudio();
    talking = true; talkEl.classList.add("open"); talkHeard.textContent = "";
    startTalkListen();
  }
  function exitTalking() {
    talking = false;
    clearTimeout(talkSilence);
    if (trec) { try { trec.onend = null; trec.stop(); } catch (_) {} trec = null; }
    if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    speakQueue.length = 0; speakBuf = ""; speaking = false;
    talkEl.classList.remove("open");
  }
  function startTalkListen() {
    if (!talking) return;
    talkFinal = ""; setTalkState("listening", "Dinliyorum…"); talkHeard.textContent = "";
    trec = new SR();
    trec.lang = langSel.value; trec.continuous = true; trec.interimResults = true;

  async function talkTurn(text) {

    await ask(activeId, text);
    if (!talking) return;
    setTalkState("speaking", "Konuşuyor… (kesmek için dokun)");
    await new Promise((res) => { const t = setInterval(() => { if (!talking || (!speaking && !speakQueue.length)) { clearInterval(t); res(); } }, 200); });
    if (talking) startTalkListen();
  }
  $("talkBtn").addEventListener("click", enterTalking);
  $("talkExit").addEventListener("click", exitTalking);
  // Barge-in: tap the orb while it's speaking to cut the reply short. talkTurn
  // is awaiting the speech queue to drain, so clearing it makes it move on to
  // listening on its own (no double-start race).
  talkOrb.addEventListener("click", () => {
    if (!talking || !talkOrb.classList.contains("speaking")) return;
    if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    speakQueue.length = 0; speakBuf = ""; speaking = false;
  });

  // ---------- Command palette: repo's commands (.claude/commands + npm) ----------
  const paletteEl = $("palette"), paletteListEl = $("paletteList"), paletteSearch = $("paletteSearch");
  let paletteItems = [];
  function renderPalette(q) {
    q = (q || "").toLowerCase();
    paletteListEl.innerHTML = "";
    const items = paletteItems.filter((it) => it.label.toLowerCase().includes(q));
    if (!items.length) { paletteListEl.textContent = paletteItems.length ? "Eşleşme yok." : "Bu projede komut bulunamadı."; return; }
    let lastG = null;
    items.forEach((it) => {
      if (it.group !== lastG) { const h = document.createElement("div"); h.className = "pal-g"; h.textContent = it.group; paletteListEl.appendChild(h); lastG = it.group; }
      const b = document.createElement("button"); b.type = "button"; b.textContent = it.label;
      b.addEventListener("click", () => { composer.value = it.value; paletteEl.classList.remove("open"); composer.focus(); composer.dispatchEvent(new Event("input")); });
      paletteListEl.appendChild(b);
    });
  }
  async function openPalette() {
    if (!activeId) return;
    ensureToken();
    paletteItems = []; paletteListEl.textContent = "Yükleniyor…"; paletteSearch.value = "";
    paletteEl.classList.add("open");
    try {
      const data = await (await fetch("/api/commands?sessionId=" + encodeURIComponent(activeId), { headers: authHeaders() })).json();
      (data.groups || []).forEach((g) => g.items.forEach((it) => paletteItems.push(Object.assign({ group: g.label }, it))));
    } catch (_) {}
    renderPalette("");
    paletteSearch.focus();
  }
  $("cmdBtn").addEventListener("click", openPalette);
  $("paletteClose").addEventListener("click", () => paletteEl.classList.remove("open"));
  paletteEl.addEventListener("click", (e) => { if (e.target === paletteEl) paletteEl.classList.remove("open"); });
  paletteSearch.addEventListener("input", () => renderPalette(paletteSearch.value));

  // Escape closes any open overlay (or exits talking mode).
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (talking) { exitTalking(); return; }
    [modal, settingsEl, paletteEl].forEach((m) => m.classList.remove("open"));
  });

  resetBtn.addEventListener("click", async () => {
    try { await fetch("/api/reset", { method: "POST", headers: authHeaders({ "Content-Type": "application/json" }), body: JSON.stringify({ sessionId: activeId }) }); } catch (_) {}
    const st = active(); if (st) { st.logEl.innerHTML = ""; st.messages = []; persistHistory(st); }
    addMsg(activeId, "Yeni sohbet başladı.", "sys");
    settingsEl.classList.remove("open"); // reveal the fresh chat
  });

  sessionSel.addEventListener("change", () => switchTo(sessionSel.value));

  $("renameSession").addEventListener("click", async () => {
    const st = active(); if (!st) return;
    const name = (prompt("Yeni isim:", st.meta.name) || "").trim();
    if (!name || name === st.meta.name) return;
    try {
      const r = await fetch("/api/sessions/" + activeId, { method: "POST", headers: authHeaders({ "Content-Type": "application/json" }), body: JSON.stringify({ name }) });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Olmadı");
      st.meta = data.session; rebuildSessionSelect(); settingsEl.classList.remove("open");
    } catch (e) { alert("⚠️ " + e.message); }
  });
  $("delSession").addEventListener("click", async () => {
    if (activeId === defaultSessionId) { alert("Varsayılan oturum silinemez."); return; }
    const st = active(); if (!st) return;
    if (!confirm(`"${st.meta.name}" oturumu silinsin mi?`)) return;
    try {
      const r = await fetch("/api/sessions/" + activeId, { method: "DELETE", headers: authHeaders() });
      if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.error || "Olmadı"); }
      st.logEl.remove(); S.delete(activeId);
      try { localStorage.removeItem("vb_hist_" + activeId); } catch (_) {}
      activeId = defaultSessionId && S.has(defaultSessionId) ? defaultSessionId : (S.keys().next().value || null);
      rebuildSessionSelect(); settingsEl.classList.remove("open");
      if (activeId) switchTo(activeId); else showHome();
    } catch (e) { alert("⚠️ " + e.message); }
  });
  modeSel.addEventListener("change", () => { const st = active(); if (st) st.meta.mode = modeSel.value; prefs.mode = modeSel.value; savePrefs(); });
  langSel.addEventListener("change", () => { prefs.lang = langSel.value; savePrefs(); populateVoices(); });
  ttsVoiceSel.addEventListener("change", () => { prefs.voices = prefs.voices || {}; prefs.voices[langKey()] = ttsVoiceSel.value; savePrefs(); });
  rateInput.addEventListener("change", () => { prefs.rate = parseFloat(rateInput.value) || 1; savePrefs(); });
  talkSilenceInput.addEventListener("change", () => { prefs.talkSilence = parseFloat(talkSilenceInput.value) || 1.3; savePrefs(); });
  handsfree.addEventListener("change", () => { prefs.handsfree = handsfree.checked; savePrefs(); });
  cuesChk.addEventListener("change", () => { prefs.cues = cuesChk.checked; savePrefs(); if (cuesChk.checked) { ensureAudio(); cue("done"); } });
  voiceChk.addEventListener("change", () => { const st = active(); if (st) st.meta.voice = voiceChk.checked; prefs.voice = voiceChk.checked; savePrefs(); });
  notifyChk.addEventListener("change", () => {
    prefs.notify = notifyChk.checked; savePrefs();
    if (!notifyChk.checked || !("Notification" in window)) return;
    const after = (p) => { if (p === "granted") ensurePush(); else { notifyChk.checked = false; prefs.notify = false; savePrefs(); } };
    if (Notification.permission === "default") Notification.requestPermission().then(after);
    else after(Notification.permission);
  });
  themeBtn.addEventListener("click", () => {
    const cur = prefs.theme || "system";
    prefs.theme = THEMES[(THEMES.indexOf(cur) + 1) % THEMES.length];
    savePrefs(); applyTheme();
  });

  // ---------- New-session modal ----------
  const nsAgent = $("ns-agent"), nsMode = $("ns-mode"), nsFav = $("ns-fav");
  // Favorites: server-provided (CONFIG.favorites) followed by local (prefs.favorites).
  const serverFavs = () => CONFIG.favorites || [];
  const localFavs = () => prefs.favorites || (prefs.favorites = []);
  const allFavs = () => serverFavs().concat(localFavs());
  function renderFavSelect() {
    nsFav.innerHTML = "";
    const ph = document.createElement("option"); ph.value = ""; ph.textContent = "— favori seç —"; nsFav.appendChild(ph);
    allFavs().forEach((f, i) => { const o = document.createElement("option"); o.value = String(i); o.textContent = (i < serverFavs().length ? "🌐 " : "★ ") + (f.name || f.projectDir); nsFav.appendChild(o); });
    nsFav.value = "";
  }
  function applyFav() {
    const i = parseInt(nsFav.value, 10);
    if (isNaN(i)) return;
    const f = allFavs()[i]; if (!f) return;
    if (f.agent && agentById[f.agent]) nsAgent.value = f.agent;
    $("ns-name").value = f.name || "";
    $("ns-dir").value = f.projectDir || "";
    fillModeSelect(nsMode, nsAgent.value, f.mode);
  }
  const RUNNER_LABEL = { local: "💻 Yerel", cloud: "☁️ Bulut" };
  function openModal() {
    nsAgent.innerHTML = "";
    (CONFIG.agents || []).forEach((a) => { const o = document.createElement("option"); o.value = a.id; o.textContent = a.label + (a.available === false ? " — bulunamadı" : ""); nsAgent.appendChild(o); });
    const runners = CONFIG.runners || ["local"];
    const nsRunner = $("ns-runner"); nsRunner.innerHTML = "";
    runners.forEach((rn) => { const o = document.createElement("option"); o.value = rn; o.textContent = RUNNER_LABEL[rn] || rn; nsRunner.appendChild(o); });
    $("ns-runner-row").style.display = runners.length > 1 ? "flex" : "none";
    $("ns-name").value = ""; $("ns-dir").value = CONFIG.defaultProjectDir || "";
    $("ns-tree").style.display = "none";
    fillModeSelect(nsMode, nsAgent.value);
    refreshOllamaModels();
    renderFavSelect();
    modal.classList.add("open");
  }
  async function refreshOllamaModels() {
    const row = $("ns-omodel-row"), sel = $("ns-omodel");
    if (nsAgent.value !== "ollama") { row.style.display = "none"; return; }
    row.style.display = "flex";
    sel.innerHTML = '<option value="">(varsayılan)</option>';
    try {
      const { models } = await (await fetch("/api/ollama/models", { headers: authHeaders() })).json();
      (models || []).forEach((m) => { const o = document.createElement("option"); o.value = m; o.textContent = m; sel.appendChild(o); });
    } catch (_) {}
  }
  nsAgent.addEventListener("change", () => { fillModeSelect(nsMode, nsAgent.value); refreshOllamaModels(); });

  // Folder browser for the project directory.
  const nsTree = $("ns-tree");
  async function browseTo(p) {
    try {
      const u = new URLSearchParams(); if (p) u.set("path", p);
      if (($("ns-runner").value || "local") === "cloud") u.set("runner", "cloud"); // browse the remote host
      const data = await (await fetch("/api/browse?" + u.toString(), { headers: authHeaders() })).json();
      $("ns-dir").value = data.path || "";
      nsTree.innerHTML = "";
      const cur = document.createElement("div"); cur.className = "cur"; cur.textContent = data.path || ""; nsTree.appendChild(cur);
      if (data.parent) { const b = document.createElement("button"); b.type = "button"; b.className = "up"; b.textContent = "⬆ üst"; b.addEventListener("click", () => browseTo(data.parent)); nsTree.appendChild(b); }
      (data.dirs || []).forEach((d) => {
        const b = document.createElement("button"); b.type = "button"; b.textContent = "📁 " + d;
        b.addEventListener("click", () => browseTo((data.path.endsWith("/") ? data.path : data.path + "/") + d));
        nsTree.appendChild(b);
      });
      nsTree.style.display = "flex";
    } catch (_) {}
  }
  $("ns-browse").addEventListener("click", () => {
    if (nsTree.style.display === "none") browseTo($("ns-dir").value.trim());
    else nsTree.style.display = "none";
  });
  nsFav.addEventListener("change", applyFav);
  $("ns-save").addEventListener("click", () => {
    const dir = $("ns-dir").value.trim(); if (!dir) { alert("Önce proje klasörü gir."); return; }
    const fav = { name: $("ns-name").value.trim() || dir, agent: nsAgent.value, mode: nsMode.value, projectDir: dir };
    const lf = localFavs();
    const existing = lf.findIndex((f) => f.projectDir === dir && f.agent === fav.agent);
    if (existing >= 0) lf[existing] = fav; else lf.push(fav);
    savePrefs(); renderFavSelect();
  });
  $("ns-fav-del").addEventListener("click", () => {
    const i = parseInt(nsFav.value, 10);
    if (isNaN(i) || i < serverFavs().length) { alert("Sadece kendi favorilerini silebilirsin."); return; }
    localFavs().splice(i - serverFavs().length, 1); savePrefs(); renderFavSelect();
  });
  newSessionBtn.addEventListener("click", openModal);
  $("ns-cancel").addEventListener("click", () => modal.classList.remove("open"));
  $("ns-create").addEventListener("click", async () => {
    const body = { name: $("ns-name").value.trim(), agent: nsAgent.value, mode: nsMode.value, projectDir: $("ns-dir").value.trim(), voice: !!prefs.voice, runner: $("ns-runner").value || "local" };
    if (nsAgent.value === "ollama" && $("ns-omodel").value) body.model = $("ns-omodel").value;
    try {
      const r = await fetch("/api/sessions", { method: "POST", headers: authHeaders({ "Content-Type": "application/json" }), body: JSON.stringify(body) });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Oluşturulamadı");
      addSessionState(data.session); rebuildSessionSelect(); modal.classList.remove("open"); openChat(data.session.id);
    } catch (e) { alert("⚠️ " + e.message); }
  });

  if ("speechSynthesis" in window) window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); populateVoices(); };

  // Register the service worker (installable PWA + reliable notifications).
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});

  // A QR/link may carry ?token=… so scanning authorizes the phone on open.
  (() => {
    const t = new URLSearchParams(location.search).get("token");
    if (t) { token = t.trim(); localStorage.setItem("vb_token", token); history.replaceState(null, "", location.pathname); }
  })();

  // ---------- Boot ----------
  applyTheme();
  renderChips();
  if (prefs.lang) langSel.value = prefs.lang;
  if (prefs.handsfree) handsfree.checked = true;
  cuesChk.checked = cuesOn();
  notifyChk.checked = !!prefs.notify;
  rateInput.value = prefs.rate || 1;
  talkSilenceInput.value = prefs.talkSilence || 1.3;
  fontSizeInput.value = prefs.fontSize || 15;
  applyFontSize();
  populateVoices();
  (async () => {
    try { CONFIG = await (await fetch("/api/config")).json(); } catch (_) {}
    (CONFIG.agents || []).forEach((a) => { agentById[a.id] = a; });
    if (CONFIG.sttMode === "browser" && !SR) { micBtn.classList.add("na"); setStatus(noVoiceMsg()); }
    if (CONFIG.sttMode === "whisper") { handsfree.disabled = true; handsfree.closest("label").style.opacity = .4; }
    await ensureToken();
    let list = { sessions: [], defaultSessionId: null };
    try { list = await (await fetch("/api/sessions", { headers: authHeaders() })).json(); } catch (_) {}
    (list.sessions || []).forEach(addSessionState);
    defaultSessionId = list.defaultSessionId || (list.sessions[0] && list.sessions[0].id) || null;
    activeId = defaultSessionId;
    if (!activeId && S.size) activeId = S.keys().next().value;
    rebuildSessionSelect();
    if (prefs.voice) for (const st of S.values()) st.meta.voice = true;
    if (activeId) switchTo(activeId);
    showHome(); // land on the session list
    if (prefs.notify) ensurePush();
  })();
})();
</script>
</body>
</html>
