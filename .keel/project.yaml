# keel consumer config (generated by `keel init`)
extends: keel
core_version: "^1.0"
repo: "speak-with-claude-code"
base_branch: "main"
platform: "node"
consent_mode: "explicit"

knobs:
  # voicebridge is a zero-dependency Node project with no test/lint scripts;
  # the build gate is a syntax check of the server entrypoint.
  build_gate_cmd: "node --check server.js"
  tier3_globs:
    - "server.js"
    - "public/**/*.html"

gates: [build]
extensions: {}
extensions_dir: .keel/extensions
