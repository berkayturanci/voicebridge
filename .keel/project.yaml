# keel consumer config (generated by `keel init`)
extends: keel
core_version: "^1.0"
owner: "berkayturanci"
repo: "voicebridge"
base_branch: "main"
platform: "node"
consent_mode: "explicit"

knobs:
  # voicebridge is a zero-dependency Node project; the build gate syntax-checks
  # the entrypoint and runs the node:test suite.
  build_gate_cmd: "node --check server.js && npm test"
  tier3_globs:
    - "server.js"
    - "public/**/*.html"

gates: [build]
extensions: {}
extensions_dir: .keel/extensions
